# Reusable Workflows see: https://github.com/entur/gha-security/blob/main/README-code-scan.md

name: CodeQL Scan

on:
  pull_request:
    branches:
      - "main"
      - "5.x"
  push:
    branches:
      - "main"
      - "5.x"
  schedule:
    - cron: "0 3 * * MON" # Run Monday at 3AM UTC

jobs:
  code-scan:
    name: CodeQL Scan
    uses: entur/gha-security/.github/workflows/code-scan.yml@aeebe7ddac5952b3ef9f14380e2d5884b42a6c2e #(2.13.0)
    # no secrets necessary
    permissions:
      packages: read
      security-events: write
      actions: read
      contents: write
      issues: write
      pull-requests: write
      issues: write
